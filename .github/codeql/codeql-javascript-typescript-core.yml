name: openclaw-codeql-javascript-typescript-core

paths:
  - src/agents
  - src/plugin-sdk
  - src/infra
  - src/gateway
  - src/commands
  - src/auto-reply
  - src/plugins
  - src/cli
  - src/config
  - src/channels

paths-ignore:
  - apps
  - dist
  - docs
  - "**/node_modules"
  - "**/coverage"
  - "**/*.generated.ts"
  - "**/*.bundle.js"
  - "**/*-runtime.js"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.e2e.test.ts"
  - "**/*.e2e.test.tsx"
